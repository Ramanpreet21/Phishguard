services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: phishing-detector:latest
    container_name: phishing-api
    ports:
      - "8000:8000"
    environment:
      PREDICTOR_DEVICE: cpu      # change to "cuda" if GPU available
      PORT:     8000
      WORKERS:  1
    volumes:
      # Persist trained model artifacts (run train.py first on host)
      - ./src/models/artifacts:/app/src/models/artifacts:ro
      # Persist request + prediction logs
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 20s

  # ── Optional: lightweight Redis cache layer ───────────────────
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

networks:
  default:
    name: phishing-net
